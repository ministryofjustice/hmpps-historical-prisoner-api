---
generic-service:
  replicaCount: 2

  ingress:
    host: historical-prisoner-api-dev.prison.service.justice.gov.uk
    className: modsec-non-prod

  env:
    APPLICATIONINSIGHTS_CONFIGURATION_FILE: "applicationinsights.dev.json"
    HMPPS_AUTH_URL: "https://sign-in-dev.hmpps.service.justice.gov.uk/auth"
    DATABASE_NAME: "iis-dev"
    SPRINGDOC_API-DOCS_ENABLED: "true"
    SPRINGDOC_SWAGGER-UI_ENABLED: "true"
    APPLICATIONINSIGHTS_STATSBEAT_DISABLED: "true"
    JAVA_TOOL_OPTIONS: "$(JAVA_PROXY_TOOL_OPTIONS) -XX:+ExitOnOutOfMemoryError -XX:MaxRAMPercentage=50.0"

  namespace_secrets:
    hmpps-envoy-https-proxy-env:
      HTTP_PROXY: "HTTP_PROXY"
      HTTPS_PROXY: "HTTPS_PROXY"
      NO_PROXY: "NO_PROXY"
      JAVA_PROXY_TOOL_OPTIONS: "JAVA_PROXY_TOOL_OPTIONS"

  scheduledDowntime:
    enabled: true
    startupOverride: '32 6 * * 1-5' # Start at 6.32am UTC Monday-Friday
    shutdown: '42 21 * * 1-5' # Stop at 9.42pm UTC Monday-Friday

generic-prometheus-alerts:
  businessHoursOnly: true
  alertSeverity: syscon-nonprod
  rdsAlertsDatabases:
    cloud-platform-ddb6945a92970e78: "historical prisoner"
