name: Security CodeQL java/kotlin scan

on:
  workflow_dispatch:
  schedule:
    - cron: "2 8 * * MON-FRI" # Every weekday at 08:02 UTC

jobs:
  security-codeql-check:
    permissions:
      contents: read
      actions: read
      security-events: write
    name: Project security CodeQL java/kotlin scan
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_codeql.yml@v2 # WORKFLOW_VERSION
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
      languages: java-kotlin
    secrets: inherit
